version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - BACKEND_API_KEY=${BACKEND_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - EMAIL_FROM=${EMAIL_FROM}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/process-sales
      - NEXT_PUBLIC_BACKEND_API_KEY=${BACKEND_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend

